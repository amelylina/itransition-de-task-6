{% extends "base.html" %}

{% block content %}

<section>
<form method="get" action="/">
    <div class="grid">
        <label>
            Locale
            <select name="locale" required>
                {% for loc in locales %}
                <option value="{{ loc.code }}" {% if loc.code == selected_locale %}selected{% endif %}>
                    {{ loc.name }}
                </option>
                {% endfor %}
            </select>
        </label>

        <label>
            Seed
            <input type="number" name="seed" value="{{ seed if seed is not none else 42 }}" required>
        </label>

        <label>
            Batch size
            <input type="number" name="batch_size" value="{{ batch_size }}" min="1" max="1000" required>
        </label>
    </div>

    <input type="hidden" name="batch" value="0">

    <button type="submit">Generate</button>
</form>
</section>

{% if users %}
<section>
    <hgroup>
        <h2>Batch #{{ batch }}</h2>
        <p>Locale: <code>{{ selected_locale }}</code> · Seed: <code>{{ seed }}</code> · {{ users | length }} users</p>
    </hgroup>

    <figure>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Gender</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Height (cm)</th>
                <th>Weight (kg)</th>
                <th>Eyes</th>
                <th>Hair</th>
                <th>Coordinates</th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr>
                <td class="user-id">{{ u.idx_in_batch }}</td>
                <td>{{ u.gender }}</td>
                <td>{{ u.full_name }}</td>
                <td>{{ u.email }}</td>
                <td>{{ u.phone }}</td>
                <td>{{ u.address }}</td>
                <td>{{ u.height_cm }}</td>
                <td>{{ u.weight_kg }}</td>
                <td>{{ u.eye_color }}</td>
                <td>{{ u.hair_color }}</td>
                <td class="coord">{{ "%.4f"|format(u.lat) }}, {{ "%.4f"|format(u.lon) }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    </figure>

    <nav>
        <a href="/?locale={{ selected_locale }}&seed={{ seed }}&batch={{ batch + 1 }}&batch_size={{ batch_size }}" role="button">
            Next batch →
        </a>
        <a href="/" role="button" class="secondary">New search</a>
    </nav>
</section>
{% endif %}

{% endblock %}
