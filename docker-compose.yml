services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-faker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faker}
      POSTGRES_DB: ${POSTGRES_DB:-sqlfaker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data